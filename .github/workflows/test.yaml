name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Python ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
        os: [ubuntu-latest]
        include:
          # One macOS run on the latest stable Python
          - os: macos-latest
            python-version: "3.12"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install system dependencies (Ubuntu only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y swig build-essential gfortran python3-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip wheel
          pip install numpy scipy cython
          pip install -r requirements.txt
          pip install -e ".[test]"

      - name: Lint with ruff
        run: |
          ruff check sekupy/ --select E9,F63,F7,F82 --output-format=github

      - name: Run tests with coverage
        run: |
          pytest --pyargs sekupy \
                 --cov=sekupy \
                 --cov-report=xml \
                 --cov-report=term-missing \
                 -v

      - name: Upload coverage to Codecov
        if: success() && matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          flags: unittests
          name: sekupy-coverage
          fail_ci_if_error: false

  # Dedicated job to verify that the package builds and installs cleanly
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for hatch-vcs versioning

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Build wheel and sdist
        run: |
          pip install build
          python -m build

      - name: Check distribution with twine
        run: |
          pip install twine
          twine check dist/*
